name: budget-travel
description: 穷游旅行全流程管线 — 从调研规划到打卡记录再到游记总结
stages:
  - name: 调研与路线规划
    data:
      description: 确定目的地、交通方式、预算估算、住宿选择、景点筛选
      checklist:
        - 确定出发日期和天数
        - 查询火车班次和票价
        - 规划每日行程路线
        - 预订住宿（青旅/民宿）
        - 整理必带物品清单
  - name: 旅行打卡
    data:
      description: 旅途中记录实际行程、花销、体验
      checklist:
        - 出发签到
        - 每日行程打卡与花销记录
        - 拍照/视频素材收集
        - 记录意外发现和临时调整
        - 返程签到
  - name: 游记与总结
    data:
      description: 整理旅行素材，撰写游记，复盘预算
      checklist:
        - 整理照片和素材
        - 撰写游记
        - 实际花销 vs 预算对比
        - 经验总结和推荐tips
        - 发布/归档
